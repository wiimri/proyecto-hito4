services:
  - type: web
    name: mercado-vecino-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mercado-vecino-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: mercado-vecino-db
    databaseName: mercado_vecino
    user: mercado_vecino_user
